# ============================================================
# Configuración de la aplicación
# ============================================================
spring.application.name=appbank-backend
server.port=8080

# ============================================================
# Base de datos PostgreSQL
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/appbank}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT
# ============================================================
# IMPORTANTE: En producción, reemplazar con una variable de entorno segura
# El secreto debe ser una cadena Base64 de al menos 32 bytes
app.jwt.secret=${JWT_SECRET:Y2hhbmdlVGhpc1NlY3JldEtleUluUHJvZHVjdGlvbkVudmlyb25tZW50Rm9yQXBwQmFuazIwMjQ=}
app.jwt.expiration-ms=86400000

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
