version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: appbank-db
    environment:
      POSTGRES_DB: appbank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appbank"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appbank-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/appbank
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: Y2hhbmdlVGhpc1NlY3JldEtleUluUHJvZHVjdGlvbkVudmlyb25tZW50Rm9yQXBwQmFuazIwMjQ=
    ports:
      - "8080:8080"

volumes:
  postgres_data:
